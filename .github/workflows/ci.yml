name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm ci rejects this cross-platform lockfile's optional WASM peers.
      - run: npm install
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
